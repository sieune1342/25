<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{_layout :: head(~{::title})}">
    <title>Thêm Sản Phẩm Mới</title>
</head>

<body class="bg-light">

    <div th:replace="~{_layout :: navbar}"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">

                <div class="card border-0 shadow-lg rounded-4">
                    
                    <!-- Header -->
                    <div class="card-header bg-gradient bg-primary text-white rounded-top-4 py-3">
                        <h3 class="mb-0 text-center">
                            <i class="bi bi-box-seam me-2"></i>
                            Thêm Sản Phẩm Mới
                        </h3>
                    </div>

                    <!-- Body -->
                    <div class="card-body p-4">

                        <form th:action="@{/products/save}" 
                              th:object="${product}" 
                              method="post">

                            <!-- Name -->
                            <div class="mb-4">
                                <label for="name" class="form-label fw-semibold">
                                    Tên sản phẩm
                                </label>
                                <input class="form-control form-control-lg rounded-3"
                                       type="text"
                                       th:field="*{name}"
                                       id="name"
                                       placeholder="Nhập tên sản phẩm..."
                                       required>
                            </div>

                            <!-- Image -->
                            <div class="mb-4">
                                <label for="image" class="form-label fw-semibold">
                                    Link hình ảnh
                                </label>
                                <input class="form-control rounded-3"
                                       type="text"
                                       th:field="*{image}"
                                       id="image"
                                       placeholder="https://example.com/image.jpg">
                            </div>

                            <!-- Price -->
                            <div class="mb-4">
                                <label for="price" class="form-label fw-semibold">
                                    Giá sản phẩm
                                </label>
                                <div class="input-group">
                                    <input class="form-control rounded-start-3"
                                           type="number"
                                           th:field="*{price}"
                                           id="price"
                                           placeholder="Nhập giá tiền..."
                                           required>
                                    <span class="input-group-text">VNĐ</span>
                                </div>
                            </div>

                            <!-- Category -->
                            <div class="mb-4">
                                <label for="category" class="form-label fw-semibold">
                                    Danh mục
                                </label>
                                <select th:field="*{category}"
                                        class="form-select rounded-3"
                                        id="category"
                                        required>
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}">
                                    </option>
                                </select>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex justify-content-end gap-3 mt-4">
                                <a th:href="@{/products}"
                                   class="btn btn-outline-secondary px-4 rounded-3">
                                    Hủy
                                </a>

                                <button type="submit"
                                        class="btn btn-success px-4 rounded-3 shadow-sm">
                                    <i class="bi bi-check-circle me-1"></i>
                                    Lưu sản phẩm
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{_layout :: footer}"></div>

</body>
</html>
