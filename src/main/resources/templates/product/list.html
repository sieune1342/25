<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{_layout :: head(~{::title})}">
    <title>Danh sách sản phẩm</title>
</head>

<body class="bg-light">

<div th:replace="~{_layout :: navbar}"></div>

<div class="container py-5">

    <!-- Header + Button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0">
            <i class="bi bi-box-seam me-2 text-primary"></i>
            Danh sách sản phẩm
        </h3>

        <a th:href="@{/products/add}" 
           class="btn btn-primary px-4 rounded-3 shadow-sm">
            <i class="bi bi-plus-circle me-1"></i>
            Thêm sản phẩm
        </a>
    </div>

    <!-- Card Table -->
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-4">

            <div class="table-responsive">
                <table class="table align-middle table-hover">
                    <thead class="table-dark">
                        <tr class="text-center">
                            <th>ID</th>
                            <th>Tên sản phẩm</th>
                            <th>Hình ảnh</th>
                            <th>Giá</th>
                            <th>Danh mục</th>
                            <th width="150">Hành động</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="product : ${products}" class="text-center">

                            <td th:text="${product.id}" class="fw-semibold"></td>

                            <td th:text="${product.name}" class="fw-semibold text-start"></td>

                            <td>
                                <img th:src="${product.image}"
                                     alt="Product Image"
                                     class="rounded-3 shadow-sm"
                                     style="width:120px;height:90px;object-fit:cover;">
                            </td>

                            <td class="text-success fw-bold"
                                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                            </td>

                            <td th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">
                            </td>

                            <!-- ACTION -->
                            <td>
                                <div class="d-flex justify-content-center gap-2">
                                    
                                    <a th:href="@{/products/edit/{id}(id=${product.id})}"
                                       class="btn btn-sm btn-warning rounded-3">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>

                                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                       onclick="return confirm('Bạn có chắc muốn xóa?')"
                                       class="btn btn-sm btn-danger rounded-3">
                                        <i class="bi bi-trash"></i>
                                    </a>

                                </div>
                            </td>

                        </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

<div th:replace="~{_layout :: footer}"></div>

</body>
</html>
