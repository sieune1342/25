<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title th:replace="${title}">Quản Lý Sản Phẩm</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        footer {
            background: #fff;
            padding: 20px 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav th:fragment="navbar" 
     class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" th:href="@{/products}">
            <i class="bi bi-box-seam me-2"></i>
            QLSP System
        </a>

        <button class="navbar-toggler" 
                type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/products}">
                        <i class="bi bi-house-door me-1"></i>
                        Trang chủ
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/products/add}">
                        <i class="bi bi-plus-circle me-1"></i>
                        Thêm sản phẩm
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>


<!-- ================= FOOTER ================= -->
<footer th:fragment="footer" class="mt-5">
    <div class="container text-center">
        <hr>
        <p class="mb-1 fw-semibold">
            <i class="bi bi-code-slash me-1"></i>
            Phát triển ứng dụng với J2EE
        </p>
        <small class="text-muted">
            &copy; 2026 - Hệ thống quản lý sản phẩm
        </small>
    </div>
</footer>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
